<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="#0a0f1e"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Scan rings -->
  <circle cx="100" cy="100" r="32" fill="none" stroke="#2563eb" stroke-width="1.2" opacity="0.55"/>
  <circle cx="100" cy="100" r="56" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.35"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#2563eb" stroke-width="0.8" opacity="0.2"/>

  <!-- Radar sweep sector -->
  <path d="M100,100 L178,62 A88,88 0 0,1 182,108 Z" fill="#3b82f6" opacity="0.07"/>
  <line x1="100" y1="100" x2="178" y2="62" stroke="#60a5fa" stroke-width="1.5" opacity="0.55"/>

  <!-- Neural network connections -->
  <line x1="100" y1="82" x2="80"  y2="108" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <line x1="100" y1="82" x2="120" y2="108" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <line x1="80"  y1="108" x2="120" y2="108" stroke="#93c5fd" stroke-width="0.9" opacity="0.5"/>
  <line x1="80"  y1="108" x2="72"  y2="130" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>
  <line x1="80"  y1="108" x2="100" y2="130" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>
  <line x1="120" y1="108" x2="100" y2="130" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>
  <line x1="120" y1="108" x2="128" y2="130" stroke="#93c5fd" stroke-width="0.8" opacity="0.4"/>

  <!-- Neural nodes -->
  <circle cx="100" cy="82"  r="5"   fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
  <circle cx="80"  cy="108" r="4"   fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="120" cy="108" r="4"   fill="#1e3a8a" stroke="#60a5fa" stroke-width="1"/>
  <circle cx="72"  cy="130" r="3"   fill="#1e3a8a" stroke="#93c5fd" stroke-width="0.8"/>
  <circle cx="100" cy="130" r="3"   fill="#1e3a8a" stroke="#93c5fd" stroke-width="0.8"/>
  <circle cx="128" cy="130" r="3"   fill="#1e3a8a" stroke="#93c5fd" stroke-width="0.8"/>

  <!-- Label -->
  <text x="100" y="162" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#60a5fa" letter-spacing="4">NETSCAN</text>
  <text x="100" y="176" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3b82f6" letter-spacing="7">· AI ·</text>
</svg>
